<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        th {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
            background-color: rgb(146, 145, 145);
            color: white;
            font-size: 1.3em;
        }

        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        .format-line-header {
            background-color: white;
            color: black;
        }

        .format-td-esquerda {
            text-align: left;
        }

        .media {
            background-color: rgb(146, 145, 145);
            color: white;
            font-size: 1.3em;
            font-weight: bold;
            text-align: left;
        }

        .valor-da-media {
            background-color: rgb(146, 145, 145);
            color: white;
            font-size: 1.3em;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" class="format-line-header" scope="rowgroup">Exatas</th>
                <td class="format-td-esquerda">Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="format-td-esquerda">Física</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="format-td-esquerda">Química</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="format-td-esquerda">Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td colspan="4" class="media">Média de Exatas</td>
                <td class="valor-da-media">0.0</td>
            </tr>
            <tr>
                <th rowspan="2" class="format-line-header" scope="rowgroup">Humanas</th>
                <td class="format-td-esquerda">História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="format-td-esquerda">Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td colspan="4" class="media">Média de Humanas</td>
                <td class="valor-da-media">0.0</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
