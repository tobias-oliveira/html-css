<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse <br> sobre os termos para descobrir qual tag deverá utilizarem cada caso.</p>
    <ul type="square">
        <li>
            <abbr title="Use a tag &lt;p&gt;">Parágrafos</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;h&gt;">Títulos</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;img&gt;">Imagens</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;abbr&gt;">Abreviação</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;code&gt;">Códigos-fontes</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;ol&gt; e em seguida use a tag &lt;li&gt; ">Lista numeradas</abbr>
        </li>
        <li>
            <abbr title="Use a tag &lt;ul&gt; e em seguida use a tag &lt;li&gt; ">Lista com demarcadores</abbr>
        </li>

    </ul>
</body>
</html>
