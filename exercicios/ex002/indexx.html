<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>
        Você pode escrever um parágrafo de qualquer jeito. Basta colocar tudo no meio do par de tags &lt;p&gt; e &lt;/p&gt; &#x2705; <!-- LESS THAN / GRE THAN-->
    </p>
    <hr>
    <p>
        Se precisar quebrar o texto em algum lugar específico <br> como esse, você pode usar a tag &lt;br&gt;
    </p>
    <P>
        Vamos adicionar alguns símbolos especiais: 
        &reg;
        &copy;
        &Delta;
        &delta;
    </P>
</body>
</html>
